name: Pipeline EUDAMED UI Lab v4.3

on:
  workflow_dispatch:
    inputs:
      page_size:
        description: "Devices per page. API caps at 300."
        required: false
        default: "300"
      max_pages:
        description: "Max list pages. Use 0 for all pages."
        required: false
        default: "0"
      max_device_detail:
        description: "Device detail calls. 0 = skip, -1 = all fetched devices, positive = sample."
        required: false
        default: "0"
      max_basic_udi:
        description: "Basic UDI calls. 0 = skip."
        required: false
        default: "0"
      max_actor_detail:
        description: "Actor detail calls. 0 = skip."
        required: false
        default: "0"
      workers:
        description: "Parallel workers for list pages."
        required: false
        default: "12"
      detail_workers:
        description: "Parallel workers for device details."
        required: false
        default: "8"
      max_rps:
        description: "Global max request starts per second."
        required: false
        default: "3"
      progress_every:
        description: "Log progress every N pages/details."
        required: false
        default: "50"
      page_retry_rounds:
        description: "Extra recovery rounds for failed/missing list pages."
        required: false
        default: "5"
      page_retry_pause:
        description: "Seconds to wait before page recovery; multiplied by recovery round."
        required: false
        default: "60"
      recovery_workers:
        description: "Workers used only for failed-page recovery passes."
        required: false
        default: "4"
      global_429_pause:
        description: "Global pause seconds when a 429 wave is detected."
        required: false
        default: "60"
      global_429_max_pause:
        description: "Maximum global pause seconds."
        required: false
        default: "300"
      global_429_threshold:
        description: "Number of 429s in window before global pause."
        required: false
        default: "3"
      global_429_window:
        description: "Window seconds for global 429 threshold."
        required: false
        default: "30"
      skip_csv_zip:
        description: "Skip CSV ZIP to save time on full crawls."
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

env:
  DATA_REPO: Wakzi/EUDAHUB-Intelligence-Data
  OUT_DIR: dist/eudamed_ui_lab

jobs:
  test-ui-api-v4-3:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Set run metadata
        run: |
          echo "RUN_TS=$(date -u +'%Y%m%d_%H%M%S')" >> "$GITHUB_ENV"
          echo "DATED_TAG=eudamed-ui-lab-$(date -u +'%Y%m%d_%H%M%S')" >> "$GITHUB_ENV"
          echo "LATEST_TAG=eudamed-ui-lab-latest" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests duckdb pyarrow

      - name: Run EUDAMED UI Lab
        run: |
          python pipelines/eudamed_ui_lab/pipeline_eudamed_ui_lab.py \
            --out-dir "$OUT_DIR" \
            --language "en" \
            --page-size "${{ github.event.inputs.page_size }}" \
            --max-pages "${{ github.event.inputs.max_pages }}" \
            --max-device-detail "${{ github.event.inputs.max_device_detail }}" \
            --max-basic-udi "${{ github.event.inputs.max_basic_udi }}" \
            --max-actor-detail "${{ github.event.inputs.max_actor_detail }}" \
            --workers "${{ github.event.inputs.workers }}" \
            --detail-workers "${{ github.event.inputs.detail_workers }}" \
            --max-rps "${{ github.event.inputs.max_rps }}" \
            --progress-every "${{ github.event.inputs.progress_every }}" \
            --page-retry-rounds "${{ github.event.inputs.page_retry_rounds }}" \
            --page-retry-pause "${{ github.event.inputs.page_retry_pause }}" \
            --recovery-workers "${{ github.event.inputs.recovery_workers }}" \
            --global-429-pause "${{ github.event.inputs.global_429_pause }}" \
            --global-429-max-pause "${{ github.event.inputs.global_429_max_pause }}" \
            --global-429-threshold "${{ github.event.inputs.global_429_threshold }}" \
            --global-429-window "${{ github.event.inputs.global_429_window }}" \
            $([ "${{ github.event.inputs.skip_csv_zip }}" = "true" ] && echo "--skip-csv-zip")

      - name: List generated files
        run: |
          find "$OUT_DIR" -maxdepth 1 -type f -print -exec ls -lh {} \;

      - name: Create dated release
        env:
          GH_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
        run: |
          gh release create "$DATED_TAG" "$OUT_DIR"/* \
            --repo "$DATA_REPO" \
            --title "EUDAMED UI Lab $RUN_TS" \
            --notes "EUDAMED UI Lab v4.3 crawl."

      - name: Replace latest release
        env:
          GH_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
        run: |
          gh release delete "$LATEST_TAG" --repo "$DATA_REPO" --yes || true
          git push "https://x-access-token:${GH_TOKEN}@github.com/${DATA_REPO}.git" ":refs/tags/$LATEST_TAG" || true

          gh release create "$LATEST_TAG" "$OUT_DIR"/* \
            --repo "$DATA_REPO" \
            --title "Latest EUDAMED UI Lab" \
            --notes "Latest EUDAMED UI Lab v4.3 crawl."
