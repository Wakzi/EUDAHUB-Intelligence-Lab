name: Pipeline EUDAMED Platform Raw

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "incremental"
        type: choice
        options:
          - incremental
          - full
      skip_csv_zip:
        description: "Skip CSV ZIP export"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  schedule:
    - cron: "0 0,6,12,18 * * *"
    - cron: "0 2 * * *"

permissions:
  contents: write

concurrency:
  group: eudamed-platform-raw
  cancel-in-progress: false

env:
  DATA_REPO: Wakzi/EUDAHUB-Intelligence-Data
  OUT_DIR: dist/eudamed_platform_raw
  INPUT_DIR: inputs
  PY_FILE: pipelines/eudamed/pipeline_eudamed_platform_raw.py
  LATEST_TAG: eudamed-platform-raw-latest
  LEGACY_LATEST_TAG: eudamed-ui-lab-latest

jobs:
  fetch-platform-raw:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set run metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          TS="$(date -u +'%Y%m%d_%H%M%S')"
          echo "release_ts=$TS" >> "$GITHUB_OUTPUT"

          MODE="${{ github.event.inputs.mode || '' }}"
          if [ -z "$MODE" ]; then
            HOUR="$(date -u +'%H')"
            if [ "$HOUR" = "02" ]; then
              MODE="full"
            else
              MODE="incremental"
            fi
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"

          SKIP_CSV="${{ github.event.inputs.skip_csv_zip || 'false' }}"
          echo "skip_csv_zip=$SKIP_CSV" >> "$GITHUB_OUTPUT"

          echo "release_ts=$TS"
          echo "mode=$MODE"
          echo "skip_csv_zip=$SKIP_CSV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install duckdb pandas requests

      - name: Prepare folders
        shell: bash
        run: |
          mkdir -p "$OUT_DIR" "$INPUT_DIR"

      - name: Download previous Platform Raw assets
        shell: bash
        continue-on-error: true
        run: |
          set +e
          gh release download "$LATEST_TAG" \
            --repo "$DATA_REPO" \
            --pattern "eudamed_platform_raw.duckdb" \
            --dir "$INPUT_DIR" \
            --clobber
          gh release download "$LATEST_TAG" \
            --repo "$DATA_REPO" \
            --pattern "eudamed_platform_raw_state.json" \
            --dir "$INPUT_DIR" \
            --clobber
          ls -lh "$INPUT_DIR" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download legacy UI Lab assets for first-run migration
        shell: bash
        continue-on-error: true
        run: |
          set +e
          gh release download "$LEGACY_LATEST_TAG" \
            --repo "$DATA_REPO" \
            --pattern "eudamed_ui_lab.duckdb.zip" \
            --dir "$INPUT_DIR" \
            --clobber
          gh release download "$LEGACY_LATEST_TAG" \
            --repo "$DATA_REPO" \
            --pattern "eudamed_ui_lab_v4_6.duckdb.zip" \
            --dir "$INPUT_DIR" \
            --clobber
          gh release download "$LEGACY_LATEST_TAG" \
            --repo "$DATA_REPO" \
            --pattern "ui_api_state_v4_6.json" \
            --dir "$INPUT_DIR" \
            --clobber
          gh release download "$LEGACY_LATEST_TAG" \
            --repo "$DATA_REPO" \
            --pattern "ui_api_state.json" \
            --dir "$INPUT_DIR" \
            --clobber
          ls -lh "$INPUT_DIR" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run EUDAMED Platform Raw acquisition
        shell: bash
        run: |
          set -euo pipefail
          ARGS=(
            --mode "${{ steps.meta.outputs.mode }}"
            --out-dir "$OUT_DIR"
            --inputs-dir "$INPUT_DIR"
            --page-size 300
            --workers 12
            --max-rps 3.0
            --retries 4
            --backoff 1.5
            --discovery-retries 8
            --discovery-retry-pause 30
            --release-timestamp "${{ steps.meta.outputs.release_ts }}"
          )
          if [ "${{ steps.meta.outputs.skip_csv_zip }}" = "true" ]; then
            ARGS+=(--skip-csv-zip)
          fi
          python "$PY_FILE" "${ARGS[@]}"

      - name: Verify outputs
        shell: bash
        run: |
          set -euo pipefail
          test -s "$OUT_DIR/eudamed_platform_raw.duckdb"
          test -s "$OUT_DIR/eudamed_platform_raw_state.json"
          test -s "$OUT_DIR/eudamed_platform_raw_stats.json"
          test -s "$OUT_DIR/release_notes.md"
          if [ "${{ steps.meta.outputs.skip_csv_zip }}" != "true" ]; then
            test -s "$OUT_DIR/eudamed_platform_raw.csv.zip"
          fi
          ls -lh "$OUT_DIR"

      - name: Create dated release first
        shell: bash
        run: |
          set -euo pipefail
          TS="${{ steps.meta.outputs.release_ts }}"
          gh release create "$TS" \
            --repo "$DATA_REPO" \
            --title "$TS" \
            --notes-file "$OUT_DIR/release_notes_${TS}.md"

          gh release upload "$TS" \
            "$OUT_DIR/eudamed_platform_raw_${TS}.duckdb" \
            "$OUT_DIR/eudamed_platform_raw_state_${TS}.json" \
            "$OUT_DIR/eudamed_platform_raw_stats_${TS}.json" \
            "$OUT_DIR/release_notes_${TS}.md" \
            --repo "$DATA_REPO" \
            --clobber

          if [ -s "$OUT_DIR/eudamed_platform_raw_${TS}.csv.zip" ]; then
            gh release upload "$TS" \
              "$OUT_DIR/eudamed_platform_raw_${TS}.csv.zip" \
              --repo "$DATA_REPO" \
              --clobber
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Recreate latest release
        shell: bash
        run: |
          set -euo pipefail
          gh release delete "$LATEST_TAG" \
            --repo "$DATA_REPO" \
            --yes || true

          git push --delete "https://x-access-token:${GH_TOKEN}@github.com/${DATA_REPO}.git" "$LATEST_TAG" || true

          gh release create "$LATEST_TAG" \
            --repo "$DATA_REPO" \
            --title "EUDAMED Platform Raw Latest" \
            --notes-file "$OUT_DIR/release_notes.md"

          gh release upload "$LATEST_TAG" \
            "$OUT_DIR/eudamed_platform_raw.duckdb" \
            "$OUT_DIR/eudamed_platform_raw_state.json" \
            "$OUT_DIR/eudamed_platform_raw_stats.json" \
            "$OUT_DIR/release_notes.md" \
            --repo "$DATA_REPO" \
            --clobber

          if [ -s "$OUT_DIR/eudamed_platform_raw.csv.zip" ]; then
            gh release upload "$LATEST_TAG" \
              "$OUT_DIR/eudamed_platform_raw.csv.zip" \
              --repo "$DATA_REPO" \
              --clobber
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}