name: Pipeline EUDAMED Platform Raw

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Fetch mode"
        required: false
        default: "incremental"
        type: choice
        options:
          - "incremental"
          - "full"
      workers:
        description: "Parallel workers"
        required: false
        default: "4"
      max_rps:
        description: "Max requests per second per client"
        required: false
        default: "1.0"
      skip_csv_zip:
        description: "Skip CSV ZIP export"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: eudamed-upstream
  cancel-in-progress: false

env:
  DATA_REPO: Wakzi/EUDAHUB-Intelligence-Data
  OUT_DIR: dist/eudamed_platform_raw

jobs:
  fetch-platform-raw:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install duckdb pandas requests

      - name: Generate UTC timestamp
        id: timestamp
        run: |
          echo "timestamp=$(date -u +'%Y%m%d_%H%M%S')" >> "$GITHUB_OUTPUT"
          echo "timestamp_human=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_OUTPUT"

      - name: Prepare inputs
        env:
          GH_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
        run: |
          set +e
          mkdir -p inputs

          gh release download "eudamed-platform-raw-latest" \
            --repo "$DATA_REPO" \
            --pattern "eudamed_platform_raw.duckdb" \
            --dir inputs \
            --clobber || true

          gh release download "eudamed-platform-raw-latest" \
            --repo "$DATA_REPO" \
            --pattern "eudamed_platform_raw_state.json" \
            --dir inputs \
            --clobber || true

          gh release download "eudamed-ui-lab-latest" \
            --repo "$DATA_REPO" \
            --pattern "eudamed_ui_lab.duckdb" \
            --dir inputs \
            --clobber || true

          gh release download "eudamed-ui-lab-latest" \
            --repo "$DATA_REPO" \
            --pattern "ui_api_state*.json" \
            --dir inputs \
            --clobber || true

          ls -lh inputs || true

      - name: Run Platform Raw
        run: |
          EXTRA_ARGS=""
          if [ "${{ github.event.inputs.skip_csv_zip || 'false' }}" = "true" ]; then
            EXTRA_ARGS="--skip-csv-zip"
          fi

          python -u pipelines/eudamed/pipeline_eudamed_platform_raw.py \
            --mode "${{ github.event.inputs.mode || 'incremental' }}" \
            --out-dir "$OUT_DIR" \
            --inputs-dir inputs \
            --release-timestamp "${{ steps.timestamp.outputs.timestamp }}" \
            --workers "${{ github.event.inputs.workers || '4' }}" \
            --max-rps "${{ github.event.inputs.max_rps || '1.0' }}" \
            $EXTRA_ARGS

      - name: List output
        run: |
          find "$OUT_DIR" -maxdepth 1 -type f -print -exec ls -lh {} \;

      - name: Create latest release in Data repo
        env:
          GH_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
        run: |
          TAG="eudamed-platform-raw-latest"
          REPO="$DATA_REPO"

          gh release delete "$TAG" --repo "$REPO" --yes --cleanup-tag || true

          gh release create "$TAG" \
            --repo "$REPO" \
            --title "EUDAMED Platform Raw Latest" \
            --notes-file "$OUT_DIR/release_notes.md" \
            --latest=false

          gh release upload "$TAG" \
            "$OUT_DIR/eudamed_platform_raw.duckdb" \
            "$OUT_DIR/eudamed_platform_raw_state.json" \
            "$OUT_DIR/eudamed_platform_raw_stats.json" \
            "$OUT_DIR/release_notes.md" \
            --repo "$REPO" \
            --clobber

          if [ -f "$OUT_DIR/eudamed_platform_raw.csv.zip" ]; then
            gh release upload "$TAG" "$OUT_DIR/eudamed_platform_raw.csv.zip" --repo "$REPO" --clobber
          fi

      - name: Create dated release in Data repo
        env:
          GH_TOKEN: ${{ secrets.DATA_REPO_TOKEN }}
        run: |
          TS="${{ steps.timestamp.outputs.timestamp }}"
          TAG="eudamed-platform-raw-${TS}"
          REPO="$DATA_REPO"

          gh release create "$TAG" \
            --repo "$REPO" \
            --title "EUDAMED Platform Raw - ${{ steps.timestamp.outputs.timestamp_human }}" \
            --notes-file "$OUT_DIR/release_notes_${TS}.md" \
            --latest=false

          gh release upload "$TAG" \
            "$OUT_DIR/eudamed_platform_raw_${TS}.duckdb" \
            "$OUT_DIR/eudamed_platform_raw_state_${TS}.json" \
            "$OUT_DIR/eudamed_platform_raw_stats_${TS}.json" \
            "$OUT_DIR/release_notes_${TS}.md" \
            --repo "$REPO" \
            --clobber

          if [ -f "$OUT_DIR/eudamed_platform_raw_${TS}.csv.zip" ]; then
            gh release upload "$TAG" "$OUT_DIR/eudamed_platform_raw_${TS}.csv.zip" --repo "$REPO" --clobber
          fi
